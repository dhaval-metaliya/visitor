<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

.header {
  background: #1e293b;
  color: white;
  padding: 12px;
  font-size: 18px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #1e293b;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

.map {
  height: 250px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">📊 Visitor Dashboard</div>

<div class="container">

<div class="card">
  <h3>Login</h3>
  <input id="pass" type="password">
  <button onclick="login()">Login</button>
</div>

<div class="card">
  <h3>Visitors</h3>
  <table id="table">
    <tr>
      <th>Time</th>
      <th>Device</th>
      <th>Location</th>
      <th>Map</th>
    </tr>
  </table>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
async function login() {
  const pass = document.getElementById("pass").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pass })
  });

  const data = await res.json();

  if (!data.ok) return alert("Wrong password");

  loadVisitors();
}

async function loadVisitors() {
  const res = await fetch("/api/events");
  const list = await res.json();

  const table = document.getElementById("table");

  list.reverse().forEach((v, i) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${v.time}</td>
      <td>${v.device}</td>
      <td>
        <a href="https://maps.google.com/?q=${v.lat},${v.lng}" target="_blank">
          Open Map
        </a>
      </td>
      <td><div id="map${i}" class="map"></div></td>
    `;

    table.appendChild(row);

    setTimeout(() => {
      const map = L.map("map"+i).setView([v.lat, v.lng], 10);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

      L.marker([v.lat, v.lng]).addTo(map);
    }, 100);
  });
}
</script>

</body>
</html>
