<!DOCTYPE html>
<html>
<head>
<title>Visitor Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

.header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  background: #1e293b;
}

.container {
  padding: 15px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  background: #334155;
}

tr {
  border-bottom: 1px solid #334155;
  cursor: pointer;
}

tr:hover {
  background: #273549;
}

/* STATUS */
.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.idle { background: gray; }
.live { background: green; }

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 600px;
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
}
</style>
</head>

<body>

<div class="header">📊 Visitor Dashboard</div>

<div class="container">
  <table id="table">
    <thead>
      <tr>
        <th>Time</th>
        <th>IP</th>
        <th>Device</th>
        <th>Browser</th>
        <th>Network</th>
        <th>Status</th>
        <th>Map</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const API = "/api/events";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  Object.values(data).reverse().forEach(v => {

    const tr = document.createElement("tr");

    const mapLink = v.lat && v.lng
      ? `https://maps.google.com/?q=${v.lat},${v.lng}`
      : "#";

    tr.innerHTML = `
      <td>${formatTime(v.updated)}</td>
      <td>${v.ip || "-"}</td>
      <td>${shortDevice(v.device)}</td>
      <td>${getBrowser(v.device)}</td>
      <td>${v.network || "-"}</td>
      <td><span class="badge ${v.lat ? "live" : "idle"}">${v.lat ? "LIVE" : "IDLE"}</span></td>
      <td><a href="${mapLink}" target="_blank">📍</a></td>
    `;

    tr.onclick = () => openModal(v);

    tbody.appendChild(tr);
  });
}

function openModal(v) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <h3>Visitor Details</h3>

    <p><b>IP:</b> ${v.ip}</p>
    <p><b>Device:</b> ${shortDevice(v.device)}</p>
    <p><b>OS:</b> ${v.os}</p>
    <p><b>Browser:</b> ${getBrowser(v.device)}</p>
    <p><b>Network:</b> ${v.network}</p>

    <p><b>Location:</b><br>
    Lat: ${v.lat || "-"}<br>
    Lng: ${v.lng || "-"}</p>

    ${v.image ? `<img src="${v.image}">` : ""}

    <br>
    <button onclick="closeModal()">Close</button>
  `;

  modal.style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function formatTime(t) {
  return new Date(t).toLocaleString();
}

function shortDevice(ua = "") {
  if (ua.includes("Android")) return "Android";
  if (ua.includes("iPhone")) return "iPhone";
  if (ua.includes("Windows")) return "Windows";
  return "Unknown";
}

function getBrowser(ua = "") {
  if (ua.includes("Chrome")) return "Chrome";
  if (ua.includes("Safari")) return "Safari";
  if (ua.includes("Firefox")) return "Firefox";
  return "Unknown";
}

// 🔄 AUTO REFRESH (LIVE TRACKING)
setInterval(load, 3000);

load();
</script>

</body>
</html>
